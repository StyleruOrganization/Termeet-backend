name: t_backend

networks:
  backend-net:

volumes:
  postgres_data:

services:  

  backend:
    build: .
    container_name: backend
    ports:
      - 8000:8000
    command: |
      sh -c "alembic -c backend/alembic.ini upgrade head && \
      uvicorn backend.src.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    env_file:
      - .env
    develop:
      watch:
        - action: sync
          path: backend
          target: /code/backend

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    env_file:
      - .env
    ports:
     - 5432:5432
    volumes:
     - postgres_data:/var/lib/postgresql
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
      start_interval: 1s
