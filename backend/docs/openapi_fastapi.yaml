components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    MeetCreate:
      properties:
        data_range:
          items:
            items:
              type: string
            type: array
          title: Data Range
          type: array
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        duration:
          anyOf:
          - type: string
          - type: 'null'
          title: Duration
        link:
          anyOf:
          - type: string
          - type: 'null'
          title: Link
        name:
          title: Name
          type: string
      required:
      - name
      - data_range
      title: MeetCreate
      type: object
    MeetResponse:
      properties:
        dataRange:
          items:
            items:
              type: string
            type: array
          title: Datarange
          type: array
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        duration:
          anyOf:
          - type: string
          - type: 'null'
          title: Duration
        hash:
          format: uuid
          title: Hash
          type: string
        link:
          anyOf:
          - type: string
          - type: 'null'
          title: Link
        name:
          title: Name
          type: string
        slots:
          default: []
          items:
            $ref: '#/components/schemas/SlotsUser'
          title: Slots
          type: array
      required:
      - name
      - dataRange
      - hash
      title: MeetResponse
      type: object
    SlotsUser:
      properties:
        name:
          title: Name
          type: string
        slots:
          items:
            items:
              type: string
            type: array
          title: Slots
          type: array
      required:
      - name
      - slots
      title: SlotsUser
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
info:
  description: "API \u0434\u043B\u044F Termeet"
  title: Termeet API
  version: 1.0.0
openapi: 3.1.0
paths:
  /meet/create:
    post:
      description: "\u0421\u043E\u0437\u0434\u0430\u0435\u0442 \u0441\u043B\u043E\u0442\
        \u044B \u0434\u043B\u044F \u0432\u0441\u0442\u0440\u0435\u0447\u0438 \u043F\
        \u043E \u043E\u043F\u0440\u0435\u0434\u0435\u043B\u0435\u043D\u043D\u044B\u043C\
        \ \u0434\u043D\u044F\u043C                 \u0438 \u043F\u0440\u043E\u043C\
        \u0435\u0436\u0443\u0442\u043A\u0443 \u0432\u0440\u0435\u043C\u0435\u043D\u0438"
      operationId: create_meeting_meet_create_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: "\u0421\u043E\u0437\u0434\u0430\u0442\u044C \u0432\u0441\u0442\u0440\
        \u0435\u0447\u0443"
      tags:
      - Meet
  /meet/{hash}:
    get:
      description: "\u0412\u043E\u0437\u0432\u0440\u0430\u0449\u0430\u0435\u0442 \u0441\
        \u043B\u043E\u0442\u044B \u0432\u0441\u0442\u0440\u0435\u0447\u0438 \u0434\
        \u043B\u044F \u0432\u044B\u0431\u043E\u0440\u0430,                 \u0430\
        \ \u0442\u0430\u043A\u0436\u0435 \u0443\u0436\u0435 \u0432\u044B\u0431\u0440\
        \u0430\u043D\u043D\u044B\u0435 \u0443\u0447\u0430\u0441\u0442\u043D\u0438\u043A\
        \u0430\u043C\u0438"
      operationId: get_meeting_meet__hash__get
      parameters:
      - in: path
        name: hash
        required: true
        schema:
          format: uuid
          title: Hash
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: "\u041F\u043E\u043B\u0443\u0447\u0438\u0442\u044C \u0432\u0441\u044E\
        \ \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u044E \u043E \u0432\
        \u0441\u0442\u0440\u0435\u0447\u0435"
      tags:
      - Meet
  /meet/{hash}/slots:
    patch:
      description: "\u041E\u0442\u043F\u0440\u0430\u0432\u043B\u044F\u0435\u0442 \u0441\
        \u043B\u043E\u0442\u044B \u0432\u0441\u0442\u0440\u0435\u0447\u0438, \u043A\
        \u043E\u0442\u043E\u0440\u044B\u0435 \u0432\u044B\u0431\u0440\u0430\u043B\
        \                 \u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u0435\
        \u043B\u044C"
      operationId: add_slots_meet__hash__slots_patch
      parameters:
      - in: path
        name: hash
        required: true
        schema:
          format: uuid
          title: Hash
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SlotsUser'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotsUser'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: "\u041E\u0442\u043F\u0440\u0430\u0432\u0438\u0442\u044C \u0441\u043B\
        \u043E\u0442\u044B, \u0432\u044B\u0431\u0440\u0430\u043D\u043D\u044B\u0435\
        \ \u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u0435\u043B\u0435\
        \u043C"
      tags:
      - Meet
