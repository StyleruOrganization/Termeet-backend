networks:
  dev:

volumes:
  postgres_data:
  test_postgres_data:

services:  

  backend:
      build:
        context: .
        dockerfile: Dockerfile
        args:
          - YOUR_ENV=${MY_PROJECT_ENV}
      environment:
        # Навайбкодил - пересмотреть
        - POSTGRES_HOST=postgres
        - TEST_POSTGRES_HOST=postgres
        - RUNNING_IN_DOCKER=true
      ports:
        - 8000:8000
      command: >
        sh -c "poetry run alembic -c backend/alembic.ini upgrade head && 
              poetry run uvicorn backend.src.main:app --host 0.0.0.0 --port 8000 --reload"
      env_file:
        - .env
      volumes:
        - .:/code
      networks:
        - dev

  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    env_file:
      - .env
    ports:
     - "${POSTGRES_PORT}:5432"
    volumes:
     - postgres_data:/var/lib/postgresql
    networks:
      - dev

