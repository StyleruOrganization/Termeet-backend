components:
  schemas:
    Code:
      properties:
        code:
          title: Code
          type: string
      required:
      - code
      title: Code
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    LoginUserData:
      properties:
        email:
          title: Email
          type: string
        password:
          title: Password
          type: string
      required:
      - email
      - password
      title: LoginUserData
      type: object
    MeetCreate:
      properties:
        data_range:
          items:
            items:
              type: string
            type: array
          title: Data Range
          type: array
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        duration:
          anyOf:
          - type: string
          - type: 'null'
          title: Duration
        link:
          anyOf:
          - type: string
          - type: 'null'
          title: Link
        name:
          title: Name
          type: string
      required:
      - name
      - data_range
      title: MeetCreate
      type: object
    MeetResponse:
      properties:
        dataRange:
          items:
            items:
              type: string
            type: array
          title: Datarange
          type: array
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        duration:
          anyOf:
          - type: string
          - type: 'null'
          title: Duration
        hash:
          format: uuid
          title: Hash
          type: string
        link:
          anyOf:
          - type: string
          - type: 'null'
          title: Link
        name:
          title: Name
          type: string
        slots:
          default: []
          items:
            $ref: '#/components/schemas/SlotsUser'
          title: Slots
          type: array
      required:
      - name
      - dataRange
      - hash
      title: MeetResponse
      type: object
    RegisterUserData:
      properties:
        default_email:
          title: Default Email
          type: string
        first_name:
          title: First Name
          type: string
        last_name:
          title: Last Name
          type: string
        password:
          title: Password
          type: string
      required:
      - first_name
      - last_name
      - default_email
      - password
      title: RegisterUserData
      type: object
    SlotsUser:
      properties:
        name:
          title: Name
          type: string
        slots:
          items:
            items:
              type: string
            type: array
          title: Slots
          type: array
      required:
      - name
      - slots
      title: SlotsUser
      type: object
    TokenInfo:
      properties:
        access_token:
          title: Access Token
          type: string
        token_type:
          default: Bearer
          title: Token Type
          type: string
      required:
      - access_token
      title: TokenInfo
      type: object
    UserSchema:
      properties:
        additional_emails:
          anyOf:
          - items: {}
            type: array
          - type: 'null'
          title: Additional Emails
        email:
          title: Email
          type: string
        first_name:
          title: First Name
          type: string
        id:
          format: uuid
          title: Id
          type: string
        is_active:
          title: Is Active
          type: boolean
        last_name:
          title: Last Name
          type: string
      required:
      - id
      - first_name
      - last_name
      - is_active
      - email
      - additional_emails
      title: UserSchema
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
  securitySchemes:
    HTTPBearer:
      scheme: bearer
      type: http
info:
  description: "API \u0434\u043B\u044F Termeet"
  title: Termeet API
  version: 1.0.0
openapi: 3.1.0
paths:
  /auth/login:
    post:
      description: "\u0410\u0432\u0442\u043E\u0440\u0438\u0437\u0443\u0435\u0442 \u043F\
        \u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u0435\u043B\u044F \u043F\u043E\
        \ email \u0438 \u043F\u0430\u0440\u043E\u043B\u044E,         \u0432\u044B\u0434\
        \u0430\u0451\u0442 access \u0438 refresh \u0442\u043E\u043A\u0435\u043D"
      operationId: auth_user_issue_jwt_auth_login_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginUserData'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenInfo'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: "\u0410\u0432\u0442\u043E\u0440\u0438\u0437\u0430\u0446\u0438\u044F\
        \ \u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u0435\u043B\u044F\
        , \u0432\u044B\u0434\u0430\u0447\u0430 \u0442\u043E\u043A\u0435\u043D\u043E\
        \u0432"
      tags:
      - Auth
  /auth/refresh:
    post:
      description: "\u041E\u0431\u043D\u043E\u0432\u043B\u044F\u0435\u0442\u0441\u044F\
        \ access \u0442\u043E\u043A\u0435\u043D \u043F\u043E refresh \u0442\u043E\u043A\
        \u0435\u043D\u0443"
      operationId: auth_refresh_jwt_auth_refresh_post
      parameters:
      - in: cookie
        name: refresh_token
        required: true
        schema:
          title: Refresh Token
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenInfo'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: "\u041E\u0431\u043D\u043E\u0432\u0438\u0442\u044C access \u0442\u043E\
        \u043A\u0435\u043D"
      tags:
      - Auth
  /auth/register:
    post:
      description: "\u0420\u0435\u0433\u0438\u0441\u0442\u0440\u0438\u0440\u0443\u0435\
        \u0442 \u043D\u043E\u0432\u043E\u0433\u043E \u043F\u043E\u043B\u044C\u0437\
        \u043E\u0432\u0430\u0442\u0435\u043B\u044F, \u043F\u043E\u043B\u0443\u0447\
        \u0430\u0435\u0442 \u0435\u0433\u043E \u0434\u0430\u043D\u043D\u044B\u0435\
        ,                  \u0445\u0435\u0448\u0438\u0440\u0443\u0435\u0442 \u043F\
        \u0430\u0440\u043E\u043B\u044C, \u0441\u043E\u0445\u0440\u0430\u043D\u044F\
        \u0435\u0442 \u0432 \u0411\u0414"
      operationId: default_register_user_auth_register_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterUserData'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSchema'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: "\u0420\u0435\u0433\u0438\u0441\u0442\u0440\u0430\u0446\u0438\u044F\
        \ \u043D\u043E\u0432\u043E\u0433\u043E \u043F\u043E\u043B\u044C\u0437\u043E\
        \u0432\u0430\u0442\u0435\u043B\u044F"
      tags:
      - Auth
  /auth/users/me:
    get:
      description: "\u041F\u043E\u043B\u0443\u0447\u0430\u0435\u0442 \u044E\u0437\u0435\
        \u0440\u0430 \u0438\u0437 access-\u0442\u043E\u043A\u0435\u043D\u0430 \u0438\
        \ \u043F\u0440\u043E\u0432\u0435\u0440\u044F\u0435\u0442 \u0435\u0433\u043E\
        \ \u0432 \u0411\u0414"
      operationId: auth_user_auth_users_me_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: "\u0414\u043B\u044F \u0442\u0435\u0441\u0442\u0430, \u043F\u043E\u0442\
        \u043E\u043C \u0443\u0434\u0430\u043B\u044E!"
      tags:
      - Auth
  /auth/yandex/callback:
    post:
      description: "\u041A\u043E\u0434 \u043E\u0442\u043F\u0440\u0430\u0432\u043B\u044F\
        \u0435\u0442\u0441\u044F \u043D\u0430 \u0440\u0443\u0447\u043A\u0443 \u042F\
        \u043D\u0434\u0435\u043A\u0441\u0430                 \u0434\u043B\u044F \u043F\
        \u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0442\u043E\u043A\u0435\u043D\
        \u043E\u0432, \u043F\u043E\u0441\u043B\u0435 \u0443\u0436\u0435 access \u0442\
        \u043E\u043A\u0435\u043D                 \u043E\u0442\u043F\u0440\u0430\u0432\
        \u043B\u044F\u0435\u0442\u0441\u044F \u043D\u0430 \u0440\u0443\u0447\u043A\
        \u0443 \u042F\u043D\u0434\u0435\u043A\u0441\u0430, \u0434\u043B\u044F \u043F\
        \u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F                  \u0434\u043E\
        \u0441\u0442\u0443\u043F\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\
        \u0430\u0446\u0438\u0438 \u043E \u043F\u043E\u043B\u044C\u0437\u043E\u0432\
        \u0430\u0442\u0435\u043B\u0435, \u0434\u0430\u043B\u044C\u0448\u0435 \u0438\
        \u0434\u0435\u0442                 \u0437\u0430\u043F\u0438\u0441\u044C \u0432\
        \ \u0411\u0414, \u0432\u044B\u0434\u0430\u0447\u0430 \u0442\u043E\u043A\u0435\
        \u043D\u043E\u0432, \u043A\u043E\u0442\u043E\u0440\u044B\u0435 \u043E\u0442\
        \u0441\u044B\u043B\u0430\u044E\u0442\u0441\u044F                 \u0432 \u043A\
        \u0443\u043A\u0430\u0445 (refresh) \u0438 \u0432 Authorization: Bearer (access)"
      operationId: auth_yandex_issue_jwt_auth_yandex_callback_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Code'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenInfo'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: "\u041E\u0442\u043F\u0440\u0430\u0432\u043A\u0430 \u043A\u043E\u0434\
        \u0430, \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u0430\
        \u043D\u043D\u044B\u0445 \u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\
        \u0435\u043B\u044F,                  \u0432\u044B\u0434\u0430\u0447\u0430\
        \ \u0442\u043E\u043A\u0435\u043D\u043E\u0432"
      tags:
      - Auth
  /auth/yandex/url:
    get:
      description: "\u041F\u043E\u043B\u0443\u0447\u0430\u0435\u0442 \u0441\u043F\u0435\
        \u0446\u0438\u0430\u043B\u044C\u043D\u044B\u0439 \u043A\u043E\u0434 \u0447\
        \u0435\u0440\u0435\u0437 \u0440\u0435\u0434\u0438\u0440\u0435\u043A\u0442\
        \ \u043D\u0430                  \u0444\u0440\u043E\u043D\u0442\u0435\u043D\
        \u0434, \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043A\u043E\u0442\
        \u043E\u0440\u043E\u0433\u043E \u043F\u043E\u0442\u043E\u043C \u043C\u043E\
        \u0436\u043D\u043E \u043F\u043E\u043B\u0443\u0447\u0438\u0442\u044C \u0432\
        \                 access \u0438 refresh \u0442\u043E\u043A\u0435\u043D\u044B\
        \ \u043E\u0442 \u042F\u043D\u0434\u0435\u043A\u0441\u0430"
      operationId: get_yandex_oauth_url_auth_yandex_url_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: "\u041F\u0435\u0440\u0435\u043D\u0430\u043F\u0440\u0430\u0432\u0438\
        \u0442\u044C \u043D\u0430 \u0441\u0442\u0440\u0430\u043D\u0438\u0446\u0443\
        \ \u0430\u0432\u0442\u043E\u0440\u0438\u0437\u0430\u0446\u0438\u0438 \u042F\
        \u043D\u0434\u0435\u043A\u0441\u0430"
      tags:
      - Auth
  /meet/create:
    post:
      description: "\u0421\u043E\u0437\u0434\u0430\u0435\u0442 \u0441\u043B\u043E\u0442\
        \u044B \u0434\u043B\u044F \u0432\u0441\u0442\u0440\u0435\u0447\u0438 \u043F\
        \u043E \u043E\u043F\u0440\u0435\u0434\u0435\u043B\u0435\u043D\u043D\u044B\u043C\
        \ \u0434\u043D\u044F\u043C                 \u0438 \u043F\u0440\u043E\u043C\
        \u0435\u0436\u0443\u0442\u043A\u0443 \u0432\u0440\u0435\u043C\u0435\u043D\u0438"
      operationId: create_meeting_meet_create_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: "\u0421\u043E\u0437\u0434\u0430\u0442\u044C \u0432\u0441\u0442\u0440\
        \u0435\u0447\u0443"
      tags:
      - Meet
  /meet/{hash}:
    get:
      description: "\u0412\u043E\u0437\u0432\u0440\u0430\u0449\u0430\u0435\u0442 \u0441\
        \u043B\u043E\u0442\u044B \u0432\u0441\u0442\u0440\u0435\u0447\u0438 \u0434\
        \u043B\u044F \u0432\u044B\u0431\u043E\u0440\u0430,                 \u0430\
        \ \u0442\u0430\u043A\u0436\u0435 \u0443\u0436\u0435 \u0432\u044B\u0431\u0440\
        \u0430\u043D\u043D\u044B\u0435 \u0443\u0447\u0430\u0441\u0442\u043D\u0438\u043A\
        \u0430\u043C\u0438"
      operationId: get_meeting_meet__hash__get
      parameters:
      - in: path
        name: hash
        required: true
        schema:
          format: uuid
          title: Hash
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: "\u041F\u043E\u043B\u0443\u0447\u0438\u0442\u044C \u0432\u0441\u044E\
        \ \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u044E \u043E \u0432\
        \u0441\u0442\u0440\u0435\u0447\u0435"
      tags:
      - Meet
    patch:
      description: "\u041E\u0442\u043F\u0440\u0430\u0432\u043B\u044F\u0435\u0442 \u043F\
        \u043E\u043B\u043D\u043E\u0435 \u043E\u043F\u0438\u0441\u0430\u043D\u0438\u0435\
        \ \u0432\u0441\u0442\u0440\u0435\u0447\u0438,         \u0442\u043E \u0435\u0441\
        \u0442\u044C \u0438\u0437\u043C\u0435\u043D\u0435\u043D\u043D\u044B\u0435\
        \ \u0438 \u043D\u0435 \u0438\u0437\u043C\u0435\u043D\u0435\u043D\u043D\u044B\
        \u0435"
      operationId: edit_meeting_meet__hash__patch
      parameters:
      - in: path
        name: hash
        required: true
        schema:
          format: uuid
          title: Hash
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetCreate'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: "\u0420\u0435\u0434\u0430\u043A\u0442\u0438\u0440\u043E\u0432\u0430\
        \u0442\u044C \u0432\u0441\u0442\u0440\u0435\u0447\u0443"
      tags:
      - Meet
  /meet/{hash}/slots:
    patch:
      description: "\u041E\u0442\u043F\u0440\u0430\u0432\u043B\u044F\u0435\u0442 \u0441\
        \u043B\u043E\u0442\u044B \u0432\u0441\u0442\u0440\u0435\u0447\u0438, \u043A\
        \u043E\u0442\u043E\u0440\u044B\u0435 \u0432\u044B\u0431\u0440\u0430\u043B\
        \                 \u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u0435\
        \u043B\u044C"
      operationId: add_slots_meet__hash__slots_patch
      parameters:
      - in: path
        name: hash
        required: true
        schema:
          format: uuid
          title: Hash
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SlotsUser'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotsUser'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: "\u041E\u0442\u043F\u0440\u0430\u0432\u0438\u0442\u044C \u0441\u043B\
        \u043E\u0442\u044B, \u0432\u044B\u0431\u0440\u0430\u043D\u043D\u044B\u0435\
        \ \u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u0435\u043B\u0435\
        \u043C"
      tags:
      - Meet
  /meet/{hash}/slots/edit:
    patch:
      description: "\u041E\u0442\u043F\u0440\u0430\u0432\u043B\u044F\u0435\u0442 \u043E\
        \u0442\u0440\u0435\u0434\u0430\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u043D\
        \u043D\u044B\u0435 \u0441\u043B\u043E\u0442\u044B \u0432\u0441\u0442\u0440\
        \u0435\u0447\u0438,                 \u043A\u043E\u0442\u043E\u0440\u044B\u0435\
        \ \u0432\u044B\u0431\u0440\u0430\u043B \u043F\u043E\u043B\u044C\u0437\u043E\
        \u0432\u0430\u0442\u0435\u043B\u044C"
      operationId: edit_slots_meet__hash__slots_edit_patch
      parameters:
      - in: path
        name: hash
        required: true
        schema:
          format: uuid
          title: Hash
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SlotsUser'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotsUser'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
