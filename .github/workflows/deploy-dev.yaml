name: Deploy Dev Backend
run-name: "Deploy Dev Backend"

on:
  push:
    branches: ["dev"]
  workflow_dispatch:

# Чиню флоу

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check .env-example changes
        if: github.event_name == 'push'
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "\.env-example"; then
            echo "❌ .env-example изменился!"
            echo ""
            echo "Обнови .env на сервере, затем перезапусти workflow вручную:"
            echo "Actions → Deploy Dev Backend → Run workflow"
            exit 1
          fi

      - name: Login to Yandex Container Registry
        run: |
          echo ${{ secrets.Y_TOKEN }} | docker login \
            --username oauth \
            --password-stdin cr.yandex

      - name: Build and push Docker image

        run: |
          docker build -f Dockerfile.dev \
            -t cr.yandex/${{ secrets.CONTAINER_REGISTRY }}/backend-dev .

          docker push cr.yandex/${{ secrets.CONTAINER_REGISTRY }}/backend-dev

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose-dev.yml"
          target: "backend-dev"

      - name: Deploy to server

        uses: appleboy/ssh-action@v1.0.0
        env:
          REGISTRY: cr.yandex/${{ secrets.CONTAINER_REGISTRY }}
          DOMAIN: backend.termeet-dev.ru
          EMAIL: ${{ secrets.HTTPS_EMAIL }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: REGISTRY,DOMAIN,EMAIL
          script: |
            echo "🚀 Деплой backend-а"
            cd backend-dev

            # Логинимся в registry
            echo ${{ secrets.Y_TOKEN }} | docker login \
              --username oauth \
              --password-stdin cr.yandex

            # Автоматически проверяет контейнеры на обновления
            # В случае чего соответственно их перезапускает
            docker compose -f docker-compose-dev.yml up -d --pull always
