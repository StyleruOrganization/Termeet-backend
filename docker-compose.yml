networks:
  dev:

volumes:
  postgres_data:

services:  
  # nginx:
  #   image: nginx:stable-alpine
  #   ports:
  #     - "80:80"  # Если порт занят, то поменяй на "8050:80"
  #   volumes:
  #     - "./nginx.conf:/etc/nginx/nginx.conf"
  #   depends_on:
  #     - backend
  #   networks:
  #     - dev

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - YOUR_ENV=&{MY_PROJECT_ENV}
    ports:
      - "8000:8000"
    command: tail -f /dev/null # Не забудь это удалить!!
    # command: > # Подумай насчет того, нужно ли при разворачивании запускать миграции
    #   sh -c "poetry run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload" 
    env_file:
      - backend/settings/.env
    volumes:
      - .:/code
    networks:
      - dev

  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_PASSWORD=&{POSTGRES_PASSWORD}
      - POSTGRES_USER=&{POSTGRES_USER}
      - POSTGRES_DB=&{POSTGRES_DB}
    env_file:
      - backend/settings/.env
    ports:
     - 5432:5432
    volumes:
     - postgres_data:/var/lib/postgresql
    networks:
      - dev
